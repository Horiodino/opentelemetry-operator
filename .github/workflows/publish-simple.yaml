name: "Publish simple-app"

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

env:
  PLATFORMS: linux/amd64
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/simple-app
  DOCKERHUB_IMAGE: ${DOCKERHUB_IMAGE:-otel/simple-app}

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      image: ${{ steps.release-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "GHCR_IMAGE_LOWER=$(echo $GHCR_IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set release image
        id: release-image
        run: echo "image=${GHCR_IMAGE_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: examples/simple-app
          file: examples/simple-app/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.GHCR_IMAGE_LOWER }}:latest

      - name: Export image digest
        id: digest
        run: |
          # For push builds, extract from registry
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            DIGEST=$(docker inspect ${{ env.GHCR_IMAGE_LOWER }}:latest --format='{{index .RepoDigests 0}}' 2>/dev/null | cut -d'@' -f2 || echo "sha256:$(git rev-parse --short HEAD)")
          else
            DIGEST=$(docker inspect ${{ env.GHCR_IMAGE_LOWER }}:latest --format='{{.Id}}' 2>/dev/null | sed 's/sha256://' || echo "sha256:test")
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Sign release images
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          make cosign-sign IMAGE="${GHCR_IMAGE_LOWER}" DIGEST="${DIGEST}"
  slsa-provenance:
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    needs: publish
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.publish.outputs.image }}
      digest: ${{ needs.publish.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  collect-security-artifacts:
    permissions:
      contents: write
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    needs:
      - publish
      - slsa-provenance
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      provenance_file: ${{ steps.names.outputs.provenance_file }}
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      IMAGE: ${{ needs.publish.outputs.image }}
      DIGEST: ${{ needs.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create artifact names
        id: names
        run: |
          echo "provenance_file=simple-app-${RELEASE_TAG}.intoto.jsonl" >> "$GITHUB_OUTPUT"
      - name: Login to GitHub Package Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SLSA provenance
        env:
          PROVENANCE_FILE: ${{ steps.names.outputs.provenance_file }}
        run: make provenance-download IMAGE="${IMAGE}" DIGEST="${DIGEST}" PROVENANCE_FILE="${PROVENANCE_FILE}"

      - name: Generate and attest SBOMs
        run: make security-artifacts IMAGE="${IMAGE}" DIGEST="${DIGEST}" RELEASE_TAG="${RELEASE_TAG}"

      - name: Upload security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-security-artifacts
          path: artifacts/

      - name: Attach provenance file to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROVENANCE_FILE: ${{ steps.names.outputs.provenance_file }}
        run: |
          gh release upload "${RELEASE_TAG}" "artifacts/${PROVENANCE_FILE}" --clobber
  verify-supply-chain:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    needs:
      - publish
      - collect-security-artifacts
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    env:
      IMAGE: ${{ needs.publish.outputs.image }}
      DIGEST: ${{ needs.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify supply chain
        run: |
          set -euo pipefail
          make cosign slsa-verifier
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            COSIGN_CERT_IDENTITY_REGEXP="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/publish-simple.yaml@refs/tags/v.+$"
          else
            COSIGN_CERT_IDENTITY_REGEXP="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/publish-simple.yaml@refs/heads/main$"
          fi
          export COSIGN_EXPERIMENTAL=1
          ./bin/cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "${COSIGN_CERT_IDENTITY_REGEXP}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          ./bin/slsa-verifier verify-image "${IMAGE}@${DIGEST}" \
            --source-uri "github.com/${GITHUB_REPOSITORY}"