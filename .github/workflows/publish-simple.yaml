name: "Publish simple-app"

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/simple-app

permissions:
  contents: read

jobs:
  publish:
    permissions:
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase-image
        run: echo "image=$(echo $GHCR_IMAGE | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.lowercase-image.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{raw}}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: examples/simple-app
          file: examples/simple-app/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Sign image
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          make cosign-sign IMAGE="${{ steps.lowercase-image.outputs.image }}" DIGEST="${DIGEST}"
