name: "Publish simple-app"

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

env:
  PLATFORMS: linux/amd64,linux/arm64
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/simple-app

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.release-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase-image
        run: echo "ghcr_image_lower=$(echo $GHCR_IMAGE | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set release image
        id: release-image
        run: echo "image=${{ steps.lowercase-image.outputs.ghcr_image_lower }}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.lowercase-image.outputs.ghcr_image_lower }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{raw}}
            type=ref,event=branch

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: examples/simple-app
          file: examples/simple-app/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Sign release images
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          make cosign-sign IMAGE="${{ steps.lowercase-image.outputs.ghcr_image_lower }}" DIGEST="${DIGEST}"

      - name: Tag GHCR signature manifest
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.lowercase-image.outputs.ghcr_image_lower }}
        run: |
          set -euo pipefail
          # cosign triangulate returns the full OCI ref of the signature manifest,
          # e.g. ghcr.io/owner/simple-app:sha256-<digest>.sig
          GHCR_SIGNATURE_REF=$(make -s cosign-triangulate IMAGE="${IMAGE}" DIGEST="${DIGEST}")
          # Tag the signature manifest with a human-readable tag (e.g. main.sig or v0.1.0.sig)
          # oras tag <source-ref> <new-tag> — new-tag is just the tag portion within the same repo
          docker run --rm \
            -v "${HOME}/.docker/config.json:/root/.docker/config.json:ro" \
            ghcr.io/oras-project/oras:v1.3.0 \
            tag "${GHCR_SIGNATURE_REF}" "${GITHUB_REF_NAME}.sig"

  slsa-provenance:
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    needs: publish
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.publish.outputs.image }}
      digest: ${{ needs.publish.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  collect-security-artifacts:
    permissions:
      contents: write
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    needs:
      - publish
      - slsa-provenance
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      provenance_file: ${{ steps.names.outputs.provenance_file }}
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      IMAGE: ${{ needs.publish.outputs.image }}
      DIGEST: ${{ needs.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create artifact names
        id: names
        run: |
          echo "provenance_file=simple-app-${RELEASE_TAG}.intoto.jsonl" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SLSA provenance
        env:
          PROVENANCE_FILE: ${{ steps.names.outputs.provenance_file }}
        run: make provenance-download IMAGE="${IMAGE}" DIGEST="${DIGEST}" PROVENANCE_FILE="${PROVENANCE_FILE}"

      - name: Generate and attest SBOMs
        run: make security-artifacts IMAGE="${IMAGE}" DIGEST="${DIGEST}" RELEASE_TAG="${RELEASE_TAG}"

      - name: Upload security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-security-artifacts
          path: artifacts/

      - name: Attach provenance file to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROVENANCE_FILE: ${{ steps.names.outputs.provenance_file }}
        run: |
          gh release upload "${RELEASE_TAG}" "artifacts/${PROVENANCE_FILE}" --clobber

  verify-supply-chain:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    needs:
      - publish
      - collect-security-artifacts
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    env:
      IMAGE: ${{ needs.publish.outputs.image }}
      DIGEST: ${{ needs.publish.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify supply chain
        run: |
          set -euo pipefail
          make cosign slsa-verifier
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            COSIGN_CERT_IDENTITY_REGEXP="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/publish-simple.yaml@refs/tags/v.+$"
          else
            COSIGN_CERT_IDENTITY_REGEXP="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/publish-simple.yaml@refs/heads/main$"
          fi
          export COSIGN_EXPERIMENTAL=1
          ./bin/cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "${COSIGN_CERT_IDENTITY_REGEXP}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          ./bin/slsa-verifier verify-image "${IMAGE}@${DIGEST}" \
            --source-uri "github.com/${GITHUB_REPOSITORY}"
